<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Arial Black", "Helvetica Inserat", "Arial Bold", sans-serif;
            background-color: #ffffff;
            color: #000000;
            height: 100vh;
            overflow: hidden; 
            padding: 25px;
            text-transform: uppercase; 
        }

        a {
            color: #000000;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Top Right Corner Link */
        .top-right {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
        }

        /* NEW: Top Left Corner Link */
        .top-left {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .name-brand {
            font-size: 4vw; 
            line-height: 1;
            letter-spacing: -2px;
            text-align: center;
            user-select: none;
        }

        @media (max-width: 600px) {
            .name-brand { font-size: 12vw; }
            body { padding: 15px; }
            .top-right { top: 15px; right: 15px; }
            .top-left { top: 15px; left: 15px; } /* Updated for mobile alignment */
        }
    </style>
</head>
<body>

    <!-- Projects Button (Top Left) -->
    <div class="top-left">
        <a href="/Projects">Projects</a>
    </div>

    <!-- Contact Button (Top Right) -->
    <div class="top-right">
        <a href="/Contact">Contact</a>
    </div>

    <!-- Main Name Display -->
    <div class="main-container">
        <h1 class="name-brand">Gunter Bostwick</h1>
    </div>

</body>
</html>
